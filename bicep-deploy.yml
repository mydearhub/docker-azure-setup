# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger: none

stages:
- stage: Deploy
  jobs:
  - job: DeployAKS
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: DownloadSecureFile@1
      name: sshKey
      displayName: 'Download SSH public key'
      inputs:
        secureFile: 'k8pubkey.pub'
        retryCount: '8'

    - task: Bash@3
      displayName: 'Read SSH Key Content'
      inputs:
        targetType: 'inline'
        script: |
          sshKeyContent=$(cat "$(sshKey.secureFilePath)")
          echo "##vso[task.setvariable variable=sshPublicKeyContent]$sshKeyContent"

    - task: AzureCLI@2
      displayName: 'Build Bicep to ARM'
      inputs:
        azureSubscription: 'azure-svc-conn'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az bicep build --file $(System.DefaultWorkingDirectory)/configuration/iaac/bicep/main.bicep \
            --outfile $(System.DefaultWorkingDirectory)/configuration/iaac/bicep/main.json
          az bicep build-params \
            --file $(System.DefaultWorkingDirectory)/configuration/iaac/bicep/main.bicepparam \
            --outfile $(System.DefaultWorkingDirectory)/configuration/iaac/bicep/main.parameters.json


    - task: AzureResourceManagerTemplateDeployment@3
      displayName: 'Deploy Bicep Template'
      inputs:
        deploymentScope: 'Resource Group'
        azureResourceManagerConnection: 'azure-svc-conn'
        subscriptionId: '07349192-da34-42d5-937f-79a60bd85668'
        action: 'Create Or Update Resource Group'
        resourceGroupName: 'rg-aks-poc'
        location: 'North Europe'
        templateLocation: 'Linked artifact'
        csmFile: '$(System.DefaultWorkingDirectory)/configuration/iaac/bicep/main.bicep'
        csmParametersFile: '$(System.DefaultWorkingDirectory)/configuration/iaac/bicep/main.parameters.json'
        overrideParameters: '-sshRSAPublicKey "$(sshPublicKeyContent)"'
        deploymentMode: 'Incremental'


