# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger: none

pool:
  vmImage: ubuntu-latest

steps:
- script: echo Hello, world!
  displayName: 'Run a one-line script'

- task: DownloadSecureFile@1
  name: publickey
  inputs:
    secureFile: 'k8pubkey.pub'
    retryCount: '5'

- task: AzureResourceManagerTemplateDeployment@3
  displayName: 'Deploy Bicep Template'
  inputs:
    deploymentScope: 'Resource Group'
    azureResourceManagerConnection: 'azure-svc-conn'
    subscriptionId: '07349192-da34-42d5-937f-79a60bd85668'
    action: 'Create Or Update Resource Group'
    resourceGroupName: 'rg-aks-poc'
    location: 'North Europe'
    templateLocation: 'Linked artifact'
    csmFile: '$(System.DefaultWorkingDirectory)/configuration/iaac/bicep/main.bicep'
    csmParametersFile: '$(System.DefaultWorkingDirectory)/configuration/iaac/bicep/main.bicepparam'
    overrideParameters: '-sshRSAPublicKey $(publickey.secureFilePath)'
    deploymentMode: 'Incremental'


